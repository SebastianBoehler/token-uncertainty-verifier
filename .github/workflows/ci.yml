name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install -e ".[dev]" --no-deps

      - name: Run unit tests
        run: pytest -q

  smoke:
    name: App smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CPU runtime
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -e ".[dev]"

      - name: Import Gradio app
        run: |
          python - <<'PY'
          from token_uncertainty.app_ui import create_demo
          print(type(create_demo()).__name__)
          PY

      - name: Generate sample artifacts
        env:
          TOKEN_UV_DEVICE: cpu
        run: python scripts/generate_samples.py --model-id sshleifer/tiny-gpt2
